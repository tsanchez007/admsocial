<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b6af5"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b6af5;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <clipPath id="rounded">
      <rect width="1024" height="1024" rx="230" ry="230"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="230" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <circle cx="300" cy="300" r="300" fill="#5b6af5" filter="url(#blur1)" opacity="0.15"/>
  <circle cx="750" cy="750" r="250" fill="#a78bfa" filter="url(#blur1)" opacity="0.12"/>

  <!-- Grid lines decorative -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="256" x2="1024" y2="256"/>
    <line x1="0" y1="512" x2="1024" y2="512"/>
    <line x1="0" y1="768" x2="1024" y2="768"/>
    <line x1="256" y1="0" x2="256" y2="1024"/>
    <line x1="512" y1="0" x2="512" y2="1024"/>
    <line x1="768" y1="0" x2="768" y2="1024"/>
  </g>

  <!-- Main icon: stylized "A" + social nodes -->
  <!-- Center circle -->
  <circle cx="512" cy="440" r="90" fill="url(#accent)" opacity="0.95"/>
  <circle cx="512" cy="440" r="90" fill="url(#accent)" filter="url(#blur2)" opacity="0.4"/>

  <!-- Satellite nodes -->
  <circle cx="300" cy="310" r="52" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.8"/>
  <circle cx="300" cy="310" r="18" fill="url(#accent)" opacity="0.9"/>

  <circle cx="724" cy="310" r="52" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.8"/>
  <circle cx="724" cy="310" r="18" fill="url(#accent)" opacity="0.9"/>

  <circle cx="200" cy="580" r="40" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.6"/>
  <circle cx="200" cy="580" r="14" fill="#a78bfa" opacity="0.9"/>

  <circle cx="824" cy="580" r="40" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.6"/>
  <circle cx="824" cy="580" r="14" fill="#a78bfa" opacity="0.9"/>

  <!-- Connection lines -->
  <line x1="512" y1="440" x2="300" y2="310" stroke="url(#accent)" stroke-width="3" opacity="0.5"/>
  <line x1="512" y1="440" x2="724" y2="310" stroke="url(#accent)" stroke-width="3" opacity="0.5"/>
  <line x1="300" y1="310" x2="200" y2="580" stroke="#a78bfa" stroke-width="2" opacity="0.35"/>
  <line x1="724" y1="310" x2="824" y2="580" stroke="#a78bfa" stroke-width="2" opacity="0.35"/>
  <line x1="512" y1="440" x2="200" y2="580" stroke="#a78bfa" stroke-width="2" opacity="0.25"/>
  <line x1="512" y1="440" x2="824" y2="580" stroke="#a78bfa" stroke-width="2" opacity="0.25"/>

  <!-- "A" letter in center circle -->
  <text x="512" y="460" text-anchor="middle" font-family="'Arial Black', sans-serif" font-weight="900" font-size="80" fill="white" opacity="0.95">A</text>

  <!-- Wordmark -->
  <text x="512" y="680" text-anchor="middle" font-family="'Arial', sans-serif" font-weight="700" font-size="72" letter-spacing="8" fill="white" opacity="0.9">ADM</text>
  <text x="512" y="760" text-anchor="middle" font-family="'Arial', sans-serif" font-weight="300" font-size="52" letter-spacing="18" fill="#a78bfa" opacity="0.85">SOCIAL</text>

  <!-- Bottom accent line -->
  <rect x="362" y="800" width="300" height="3" rx="2" fill="url(#accent)" opacity="0.6"/>
</svg>
