<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdmSocial — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117; color: #e8eaf6;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center; padding: 1rem;
    }
    .login-card {
      background: #1a1d2e; border: 1px solid #2e3150;
      border-radius: 16px; padding: 2.5rem 2rem;
      width: 100%; max-width: 420px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo-icon { font-size: 2rem; color: #6c63ff; }
    .logo-text { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; margin-top: 4px; }
    .logo-sub { font-size: 0.8rem; color: #8b92c8; margin-top: 4px; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: #8b92c8; margin-bottom: 6px; }
    input {
      width: 100%; padding: 0.75rem 1rem;
      background: #252840; border: 1px solid #2e3150;
      border-radius: 8px; color: #e8eaf6;
      font-size: 0.95rem; font-family: inherit; transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #6c63ff; }
    .btn {
      width: 100%; padding: 0.85rem; background: #6c63ff; color: white;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s; margin-top: 0.5rem;
    }
    .btn:hover { background: #a78bfa; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .error-msg {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      color: #ef4444; border-radius: 8px; padding: 10px 14px;
      font-size: 0.85rem; margin-bottom: 1rem; display: none;
    }
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <div class="logo-icon">◈</div>
    <div class="logo-text" id="loginTitle">AdmSocial</div>
    <div class="logo-sub">Gestor de Redes Sociales</div>
  </div>
  <div class="error-msg" id="errorMsg"></div>
  <div class="form-group">
    <label>Usuario</label>
    <input type="text" id="username" placeholder="Tu usuario" autocomplete="username">
  </div>
  <div class="form-group">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="Tu contraseña" autocomplete="current-password">
  </div>
  <button class="btn" id="loginBtn" onclick="doLogin()">Iniciar Sesión</button>
</div>

<script>
  const adminNombre = localStorage.getItem('adminNombre');
  const logoLogin = localStorage.getItem('logoLogin');
  if (adminNombre) document.getElementById('loginTitle').textContent = adminNombre;
  if (logoLogin) {
    document.querySelector('.logo').innerHTML = `<img src="${logoLogin}" style="max-height:80px;object-fit:contain;margin-bottom:8px;"><div style="font-size:0.8rem;color:#8b92c8;margin-top:4px;">Gestor de Redes Sociales</div>`;
  }

  document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const errorEl = document.getElementById('errorMsg');
    errorEl.style.display = 'none';
    if (!username || !password) { errorEl.textContent = 'Completa todos los campos'; errorEl.style.display = 'block'; return; }
    btn.disabled = true; btn.textContent = 'Ingresando...';
    try {
      const res = await fetch('/api/auth/users', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, _action: 'login' })
      });
      const data = await res.json();
      if (data.success) { sessionStorage.setItem('user', JSON.stringify(data.user)); window.location.href = '/'; }
      else { errorEl.textContent = data.error || 'Usuario o contraseña incorrectos'; errorEl.style.display = 'block'; }
    } catch(e) { errorEl.textContent = 'Error de conexión'; errorEl.style.display = 'block'; }
    finally { btn.disabled = false; btn.textContent = 'Iniciar Sesión'; }
  }
</script>
</body>
</html>
