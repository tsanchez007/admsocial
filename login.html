<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social ADM Group</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #6c63ff22, #f5f5f5); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.card { background: white; border-radius: 20px; padding: 48px 40px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 8px 32px rgba(108,99,255,0.12); }
.logo { font-size: 3rem; margin-bottom: 8px; }
h1 { font-size: 1.6rem; color: #6c63ff; font-weight: 700; margin-bottom: 4px; }
.subtitle { color: #999; font-size: 0.85rem; margin-bottom: 32px; }
.form-group { text-align: left; margin-bottom: 16px; }
label { font-size: 0.85rem; color: #555; font-weight: 600; display: block; margin-bottom: 6px; }
input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; outline: none; transition: border 0.2s; }
input:focus { border-color: #6c63ff; }
.btn { width: 100%; padding: 14px; background: #6c63ff; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 8px; transition: background 0.2s; }
.btn:hover { background: #5a52e0; }
.error { color: #e74c3c; font-size: 0.85rem; margin-top: 12px; display: none; }
.footer { margin-top: 24px; font-size: 0.78rem; color: #bbb; }
</style>
</head>
<body>
<div class="card">
    <div class="logo">✦</div>
    <h1>Social ADM Group</h1>
    <p class="subtitle">Plataforma de gestión de redes sociales</p>
    <div class="form-group">
        <label>Usuario</label>
        <input type="text" id="username" placeholder="Tu usuario" autocomplete="username">
    </div>
    <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="Tu contraseña" autocomplete="current-password">
    </div>
    <button class="btn" onclick="doLogin()">Iniciar Sesión</button>
    <p class="error" id="errorMsg">Usuario o contraseña incorrectos</p>
    <div class="footer">Social ADM Group © 2026</div>
</div>
<script>
async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) return;
    const res = await fetch('/api/auth/users?action=login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.success) {
        sessionStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/';
    } else {
        document.getElementById('errorMsg').style.display = 'block';
    }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
